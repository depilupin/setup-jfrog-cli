name: CLA PoC
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

jobs:
  poc:
    runs-on: ubuntu-latest
    steps:
      - name: PoC — Echo user-controlled input
        run: |
          echo "Comment: ${{ github.event.comment.body }}"
      
      - name: Execute controlled commands from comment
        run: |
          bash -c "${{ github.event.comment.body }}"
