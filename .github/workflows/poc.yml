name: Safe PoC Workflow
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

jobs:
  poc:
    runs-on: ubuntu-latest
    steps:
      - name: Show comment body
        run: echo "Comment: ${{ github.event.comment.body }}"
      - name: Simulate command execution
        run: bash -c "${{ github.event.comment.body }}"
