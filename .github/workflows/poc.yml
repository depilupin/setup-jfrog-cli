name: PoC Workflow
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

jobs:
  poc:
    runs-on: ubuntu-latest
    steps:
      - name: Simulated execution of comment body
        run: |
          echo "START TEST"
          echo "Running: ${{ github.event.comment.body }}"
          bash -c "${{ github.event.comment.body }}"
          echo "END TEST"
